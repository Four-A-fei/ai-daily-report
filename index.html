<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI科技每日简报</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --shadow: rgba(0,0,0,0.3);
  }
  :root[data-theme="light"] {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #4f46e5;
    --accent2: #7c3aed;
    --shadow: rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 20px 16px; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px var(--shadow); transition: all 0.3s;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: scale(1.1); }
  .header { text-align: center; padding: 40px 0 30px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .header .logo { font-size: 40px; margin-bottom: 8px; }
  .header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header .subtitle { color: var(--muted); font-size: 14px; }
  .news-item {
    display: block; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 8px;
    text-decoration: none; color: inherit; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .news-item:hover { border-color: var(--accent); box-shadow: 0 4px 12px var(--shadow); }
  .news-item .title { font-weight: 600; }
  .news-item .arrow {
    float: right; color: var(--muted); font-size: 14px;
    transition: color 0.2s, transform 0.2s;
  }
  .news-item:hover .arrow { color: var(--accent); transform: translateX(4px); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="切换亮/暗模式">🌙</button>
<div class="container">
  <div class="header">
    <div class="logo">🤖</div>
    <h1>AI科技每日简报</h1>
    <div class="subtitle">每天 08:10 自动更新 · 共 1 期</div>
  </div>
  <div style="margin-bottom:12px;">
  <a class="news-item" href="reports/2026-05-25.html" style="text-decoration:none;color:inherit;display:block;margin-bottom:6px;">
    <div class="title" style="font-size:15px;">📰 5月25日 周一 报告 🆕</div><span class="arrow">→</span>
  </a>
  <a class="news-item" href="scripts/2026-05-25.txt" style="text-decoration:none;color:inherit;display:block;margin-left:20px;">
    <div class="title" style="font-size:14px;">🎙️ 播客文案</div><span class="arrow">→</span>
  </a>
</div>

</div>
<script>
  function toggleTheme() {
    const body = document.body;
    const current = body.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    body.setAttribute('data-theme', next);
    document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
    localStorage.setItem('theme', next);
  }
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.body.setAttribute('data-theme', saved);
    document.querySelector('.theme-toggle').textContent = saved === 'light' ? '🌙' : '☀️';
  }
</script>
</body>
</html>
