<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI科技每日简报</title>
  <style>
    :root, :root[data-theme="light"] {
      --bg: #f5f5f7; --card: #ffffff; --border: #e5e5e5;
      --text: #1a1a1a; --muted: #6b6b6b; --accent: #4f46e5;
    }
    :root[data-theme="dark"] {
      --bg: #0a0a0f; --card: #13131a; --border: #1e1e2e;
      --text: #e4e4e7; --muted: #71717a; --accent: #6366f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .container {
      max-width: 640px; width: 100%; padding: 40px 20px;
    }
    .header {
      text-align: center; padding: 40px 0 30px;
      border-bottom: 1px solid var(--border); margin-bottom: 32px;
    }
    .header .logo { font-size: 40px; margin-bottom: 8px; }
    .header h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .section-title {
      font-size: 16px; font-weight: 700; margin-bottom: 14px;
      padding-left: 10px; border-left: 3px solid var(--accent);
    }
    .report-list {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }
    .report-list li {
      list-style: none; border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    .report-list li:last-child { border-bottom: none; }
    .report-list a {
      color: var(--accent); text-decoration: none; font-size: 15px;
    }
    .report-list a:hover { text-decoration: underline; }
    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .footer {
      text-align: center; padding: 20px; color: var(--muted);
      font-size: 12px; border-top: 1px solid var(--border);
      margin-top: 32px; width: 100%;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  <div class="container">
    <div class="header">
      <div class="logo">🤖</div>
      <h1>AI 科技每日简报</h1>
      <div class="subtitle">每日AI/大模型/硬件/机器人动态</div>
    </div>
    <div class="section-title">📅 历史简报</div>
    <div class="report-list">
      <ul>
      <li><a href="reports/2026-06-29.html">2026-06-29</a></li>
      <li><a href="reports/2026-06-28.html">2026-06-28</a></li>
      <li><a href="reports/2026-06-27.html">2026-06-27</a></li>
      <li><a href="reports/2026-06-26.html">2026-06-26</a></li>
      <li><a href="reports/2026-06-25.html">2026-06-25</a></li>
      </ul>
    </div>
    <div class="footer">
      Powered by QClaw AI
    </div>
  </div>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', next);
    }
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
      }
    })();
  </script>
</body>
</html>
