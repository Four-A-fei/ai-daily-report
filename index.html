<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI科技每日简报</title>
<style>
  :root, :root[data-theme="light"] {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #4f46e5;
    --shadow: rgba(0,0,0,0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --shadow: rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px 16px;
    max-width: 760px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header .logo { font-size: 40px; margin-bottom: 8px; }
  .header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header .desc { color: var(--muted); font-size: 14px; }
  .news-item {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .news-item:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .news-item .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .news-item .arrow {
    float: right;
    color: var(--muted);
    font-size: 14px;
    margin-top: 2px;
    transition: color 0.2s, transform 0.2s;
  }
  .news-item:hover .arrow {
    color: var(--accent);
    transform: translateX(3px);
  }
  .badge-new {
    display: inline-block;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 600;
  }
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px var(--shadow);
    transition: all 0.3s;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: scale(1.1); }
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  
  <div class="header">
    <div class="logo">🤖</div>
    <h1>AI 科技每日简报</h1>
    <div class="desc">历史报告归档</div>
  </div>
  
  <div class="list">
    <a class="news-item" href="reports/2026-06-25.html">
      <div class="title">📰 6月25日 周四<span class="badge-new">NEW</span></div>
      <span class="arrow">→</span>
    </a>
    <a class="news-item" href="reports/2026-06-24.html">
      <div class="title">📰 6月24日 周三</div>
      <span class="arrow">→</span>
    </a>
    <a class="news-item" href="reports/2026-06-23.html">
      <div class="title">📰 6月23日 周二</div>
      <span class="arrow">→</span>
    </a>
  </div>
  
  <div class="footer">
    Powered by QClaw AI
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', next);
    }
    
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
      }
    })();
  </script>
</body>
</html>
