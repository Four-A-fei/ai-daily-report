<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI科技每日简报</title>
<style>
  :root, :root[data-theme="light"] {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #4f46e5;
    --shadow: rgba(0,0,0,0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --shadow: rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px 16px;
    max-width: 760px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header .logo { font-size: 40px; margin-bottom: 8px; }
  .header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header .desc { color: var(--muted); font-size: 14px; }
  .news-item {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .news-item:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .news-item .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .news-item .arrow {
    float: right;
    color: var(--muted);
    font-size: 14px;
    margin-top: 2px;
    transition: color 0.2s, transform 0.2s;
  }
  .news-item:hover .arrow {
    color: var(--accent);
    transform: translateX(3px);
  }
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <h1>AI 科技每日简报</h1>
    <div class="desc">历史报告归档</div>
  </div>
